version: 2

project_name: cin

before:
  hooks:
    - go mod tidy

builds:
  - id: cin
    main: ./cmd/cin
    binary: cin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/kado-so/cin/internal/cli.version={{ .Version }}

archives:
  - id: cin
    ids:
      - cin
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: cin
    ids:
      - cin
    repository:
      owner: kado-so
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    binaries:
      - cin
    homepage: "https://github.com/kado-so/cin"
    description: "Config management CLI for encrypted app config"
    license: MIT

scoops:
  - name: cin
    ids:
      - cin
    repository:
      owner: kado-so
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_msg_template: "Scoop update for cin {{ .Tag }}"
    homepage: "https://github.com/kado-so/cin"
    description: "Config management CLI for encrypted app config"
    license: MIT

winget:
  - name: cin
    publisher: Kado
    short_description: "Config management CLI for encrypted app config"
    license: MIT
    publisher_url: "https://github.com/kado-so"
    publisher_support_url: "https://github.com/kado-so/cin/issues/new"
    package_identifier: Kado.Cin
    package_name: cin
    ids:
      - cin
    commit_msg_template: "Kado.Cin: {{ .Tag }}"
    homepage: "https://github.com/kado-so/cin"
    description: "Config management CLI for encrypted app config"
    copyright: "Kado"
    release_notes_url: "https://github.com/kado-so/cin/releases/tag/{{ .Tag }}"
    tags:
      - config
      - secrets
      - cli
    repository:
      owner: kado-so
      name: winget-pkgs
      branch: "cin-{{ .Version }}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - cin
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        timeout: 20m
        wait: true

changelog:
  use: github
  sort: asc
